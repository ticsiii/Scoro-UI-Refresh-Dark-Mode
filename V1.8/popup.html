<!DOCTYPE html>

  <title>Scoro UI Refresh</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">

<body>
  <h1>Scoro UI Refresh</h1>

  <div class="button-container">
    <div class="toggle-btn" id="btn-refresh">
      <span class="icon">✨</span>
      <span class="label">UI<br>Refresh</span>
      <div class="status-indicator"></div>
    </div>

    <div class="toggle-btn" id="btn-autogroup">
      <span class="icon">💫</span>
      <span class="label">Noti<br>Groupping</span>
      <div class="status-indicator"></div>
    </div>

    <div class="toggle-btn" id="btn-darkmode">
      <span class="icon">🌙</span>
      <span class="label">Dark<br>Mode</span>
      <div class="status-indicator"></div>
    </div>
  </div>

  <div class="footer">
    Vibecoded with <span class="heart">♥</span> by <a href="https://ticsi.hu" target="_blank"

  <script src="popup.js"></script>

</html>
